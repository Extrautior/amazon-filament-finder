<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Filament Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600;700&family=Hanken+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=36" />
  </head>
  <body>
    <header class="app-topbar">
      <a class="brand" href="#results-shell" aria-label="Filament Finder">
        <span class="material-symbols-outlined" aria-hidden="true">precision_manufacturing</span>
        <strong>Filament Finder</strong>
      </a>

      <form id="custom-search-form" class="top-search-form">
        <span class="material-symbols-outlined" aria-hidden="true">search</span>
        <label for="custom-search-term">Search</label>
        <input id="custom-search-term" name="custom-search-term" type="text" placeholder="Search filaments by brand, color, material..." />
        <button id="run-custom-search" type="submit" title="Search custom term">
          <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
        </button>
      </form>

      <div class="top-actions">
        <button id="run-search" type="button" title="Search all materials">
          <span class="material-symbols-outlined" aria-hidden="true">manage_search</span>
          <span>Search All</span>
        </button>
        <button id="export-csv" type="button" disabled title="Export CSV">
          <span class="material-symbols-outlined" aria-hidden="true">table_view</span>
          <span>CSV</span>
        </button>
        <button id="export-json" type="button" disabled title="Export JSON">
          <span class="material-symbols-outlined" aria-hidden="true">data_object</span>
          <span>JSON</span>
        </button>
        <button id="logout-button" type="button" title="Log out">
          <span class="material-symbols-outlined" aria-hidden="true">logout</span>
        </button>
      </div>
    </header>

    <div class="app-layout">
      <aside class="filter-rail">
        <nav class="side-nav" aria-label="Main navigation">
          <a class="active" href="#results-shell">
            <span class="material-symbols-outlined" aria-hidden="true">home</span>
            Home
          </a>
          <a href="#results-shell">
            <span class="material-symbols-outlined" aria-hidden="true">search</span>
            Search
          </a>
          <a href="#history">
            <span class="material-symbols-outlined" aria-hidden="true">history</span>
            History
          </a>
        </nav>

        <section class="session-card">
          <strong id="session-state">Checking...</strong>
          <p id="status">Ready.</p>
        </section>

        <section class="filter-block">
          <div class="rail-heading">
            <h2>Filters</h2>
            <button class="rail-reset" type="button" id="rail-search-all">Reset</button>
          </div>
          <h3 class="filter-label">Material</h3>
          <div class="material-list">
            <button class="material-search active" data-material="PLA" type="button"><span class="material-check"></span>PLA <strong>0</strong></button>
            <button class="material-search" data-material="PETG" type="button"><span class="material-check"></span>PETG <strong>0</strong></button>
            <button class="material-search" data-material="ABS" type="button"><span class="material-check"></span>ABS <strong>0</strong></button>
            <button class="material-search" data-material="TPU" type="button"><span class="material-check"></span>TPU <strong>0</strong></button>
            <button class="material-search" data-material="ASA" type="button"><span class="material-check"></span>ASA <strong>0</strong></button>
          </div>

          <h3 class="filter-label">Brand</h3>
          <select class="filter-select" aria-label="Brand filter">
            <option>All Brands</option>
          </select>

          <h3 class="filter-label">Price / kg</h3>
          <div class="price-filter">
            <input type="number" placeholder="Min" />
            <input type="number" placeholder="Max" />
          </div>
        </section>

        <section id="history" class="history" hidden>
          <div id="history-list" class="history-list"></div>
        </section>
      </aside>

      <main class="results-page">
        <form id="login-form" class="login-card main-login-card">
          <label for="password">Shared app password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <button id="login-button" type="submit">
            <span class="material-symbols-outlined" aria-hidden="true">lock_open</span>
            Unlock
          </button>
        </form>

        <section class="mobile-search-card">
          <button id="mobile-search-all" type="button">
            <span class="material-symbols-outlined" aria-hidden="true">manage_search</span>
            Search All
          </button>
        </section>

        <section class="summary-strip" id="meta" hidden>
          <article>
            <span>Marketplace</span>
            <strong id="marketplace">amazon.com</strong>
          </article>
          <article>
            <span>Last searched</span>
            <strong id="searched-at">-</strong>
          </article>
          <article>
            <span>Cheapest</span>
            <strong id="cheapest-count">0</strong>
          </article>
          <article>
            <span>Discounted</span>
            <strong id="discount-count">0</strong>
          </article>
        </section>

        <section class="progress-card" id="progress-card" hidden>
          <div class="progress-head">
            <strong id="progress-label">Preparing search...</strong>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="progress-meta" id="progress-meta">Waiting to start.</p>
        </section>

        <section id="warnings" class="warnings" hidden></section>

        <section id="results-shell" class="results-shell" hidden>
          <section id="results" class="results"></section>
        </section>
      </main>
    </div>

    <nav class="mobile-nav" aria-label="Mobile navigation">
      <a class="active" href="#results-shell" data-mobile-nav="results">
        <span class="material-symbols-outlined" aria-hidden="true">view_list</span>
        Results
      </a>
      <button id="mobile-nav-search" type="button" data-mobile-nav="search">
        <span class="material-symbols-outlined" aria-hidden="true">search</span>
        Search
      </button>
      <a href="#history" data-mobile-nav="history">
        <span class="material-symbols-outlined" aria-hidden="true">history</span>
        History
      </a>
    </nav>

    <aside id="floating-results-nav" class="floating-panel floating-panel-left" hidden></aside>
    <aside id="floating-color-nav" class="floating-panel floating-panel-right" hidden></aside>
    <script src="/app.js?v=36"></script>
  </body>
</html>
